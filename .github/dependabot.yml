version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    target-branch: develop
    schedule:
      interval: weekly
      day: monday
      timezone: Asia/Tokyo
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: nuget
    directory: /Windows
    target-branch: develop
    schedule:
      interval: weekly
      day: monday
      timezone: Asia/Tokyo
    groups:
      nuget-packages:
        patterns:
          - "*"
