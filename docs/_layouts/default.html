<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: 'en-US' }}">
  <head>
    <meta charset="UTF-8">
    <title>{{ page.title | escape }}</title>
    <meta name="description" content="{{ page.description | escape }}">
    <link rel="canonical" href="{{ page.canonical_url }}">

    <meta property="og:title" content="{{ page.title | escape }}">
    <meta property="og:description" content="{{ page.description | escape }}">
    <meta property="og:image" content="{{ page.og_image }}">
    <meta property="og:image:secure_url" content="{{ page.og_image }}">
    <meta property="og:image:type" content="image/png">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:image:alt" content="{{ page.og_image_alt | escape }}">
    <meta property="og:url" content="{{ page.canonical_url }}">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="OverCUE">
    <meta property="og:locale" content="{{ page.locale }}">

    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="{{ page.title | escape }}">
    <meta name="twitter:description" content="{{ page.description | escape }}">
    <meta name="twitter:image" content="{{ page.og_image }}">
    <meta name="twitter:image:alt" content="{{ page.og_image_alt | escape }}">

    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link rel="preload" href="https://fonts.googleapis.com/css?family=Open+Sans:400,700&display=swap" as="style" type="text/css" crossorigin>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="icon" type="image/png" href="{{ '/assets/images/overcue-icon.png' | relative_url }}">
    <link rel="apple-touch-icon" href="{{ '/assets/images/overcue-icon.png' | relative_url }}">
    <link rel="stylesheet" href="{{ '/assets/css/style.css?v=' | append: site.github.build_revision | relative_url }}">
    {% include head-custom.html %}
  </head>
  <body>
    <a id="skip-to-content" href="#content">Skip to the content.</a>

    <header class="page-header" role="banner">
      <div class="page-header-inner">
        <img class="app-icon" src="{{ '/assets/images/overcue-icon.png' | relative_url }}" alt="OverCUE app icon">
        <h1 class="project-name">OverCUE</h1>
        <h2 class="project-tagline">{{ page.description | default: site.description }}</h2>
        <div class="header-actions">
          <a
            id="platform-download"
            href="https://github.com/albasimia/OverCUE/releases/latest"
            class="btn btn-primary"
            data-release-api="https://api.github.com/repos/albasimia/OverCUE/releases/latest"
            aria-busy="true"
          >Download</a>
          <a href="{{ site.github.repository_url }}" class="btn">View on GitHub</a>
        </div>
      </div>
    </header>

    <main id="content" class="main-content" role="main">
      {{ content }}

      <footer class="site-footer">
        <span class="site-footer-owner"><a href="{{ site.github.repository_url }}">{{ site.github.repository_name }}</a> is maintained by <a href="{{ site.github.owner_url }}">{{ site.github.owner_name }}</a>.</span>
        <span class="site-footer-credits">This page was generated by <a href="https://pages.github.com">GitHub Pages</a>.</span>
      </footer>
    </main>
    <script src="{{ '/assets/js/platform-download.js?v=' | append: site.github.build_revision | relative_url }}" defer></script>
  </body>
</html>
